@if (isEditing()) {
  <div class="prompt-card edit-mode">
    <div class="prompt-header">
      <div class="field">
        <label for="edit-title">Titre</label>
        <input
          id="edit-title"
          type="text"
          [(ngModel)]="editTitle"
          placeholder="Titre du prompt..."
        />
      </div>
    </div>

    <div class="field">
      <label for="edit-content">Contenu</label>
      <textarea
        id="edit-content"
        [(ngModel)]="editContent"
        placeholder="Contenu du prompt..."
        rows="8"
      ></textarea>
    </div>

    <div class="edit-actions">
      <button class="btn btn-cancel" (click)="cancelEdit()" [disabled]="isLoading()">
        Annuler
      </button>
      <button class="btn btn-save" (click)="saveEdit()" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="spinner"></span>
        }
        Sauvegarder
      </button>
    </div>
  </div>
} @else {
  <div class="prompt-card">
    <div class="prompt-header">
      <div>
        <h3 class="prompt-title">{{ prompt().title }}</h3>
        <p class="prompt-author">par {{ prompt().author.username }}</p>
      </div>
      <div class="prompt-actions">
        <button class="btn btn-icon btn-update" (click)="startEdit()" title="Modifier">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </button>
        <button class="btn btn-icon btn-delete" (click)="onDelete()" title="Supprimer">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
          </svg>
        </button>
        <button class="btn btn-icon" (click)="copyToClipboard()" title="Copier">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>

    <textarea class="prompt-content" readonly rows="8">{{ prompt().content }}</textarea>

    <div class="prompt-footer">
      <span class="category-badge">{{ prompt().category.name }}</span>
      <div class="vote-container">
        <button class="vote-btn vote-up" title="Upvote">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </button>
        <span class="vote-score">{{ prompt().score }}</span>
        <button class="vote-btn vote-down" title="Downvote">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
}
